name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm' # Speeds up future runs

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      env:
        # MAPS TO: Settings > Secrets and variables > Variables
        BASE_URL: ${{ vars.BASE_URL }}
        
        # MAPS TO: Settings > Secrets and variables > Secrets
        API_URL: ${{ secrets.API_URL }}
        SUPERADMIN_USER: ${{ secrets.SUPERADMIN_USER }}
        SUPERADMIN_PASS: ${{ secrets.SUPERADMIN_PASS }}
        ADMIN_USER: ${{ secrets.ADMIN_USER }}
        ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        HR_USER: ${{ secrets.HR_USER }}
        HR_PASS: ${{ secrets.HR_PASS }}

    - name: Upload Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30